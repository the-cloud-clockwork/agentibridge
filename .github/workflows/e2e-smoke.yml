name: E2E MCP Smoke Tests

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: anton
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ── Probe Anthropic endpoints (BASE → FALLBACK → fail) ──────────────
      - name: Probe Anthropic endpoints
        id: anthropic
        env:
          BASE_URL: ${{ vars.ANTHROPIC_URL_BASE }}
          FALLBACK_URL: ${{ vars.ANTHROPIC_URL_FALLBACK }}
        run: |
          echo "Probing BASE: ${BASE_URL}"
          HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "${BASE_URL}" 2>/dev/null || true)
          echo "  HTTP status: ${HTTP_CODE}"

          if [[ "$HTTP_CODE" != "000" && -n "$HTTP_CODE" ]]; then
            echo "BASE endpoint reachable"
            echo "selected=base" >> "$GITHUB_OUTPUT"
            echo "url=${BASE_URL}" >> "$GITHUB_OUTPUT"
            echo "model=${{ vars.ANTHROPIC_MODEL_BASE }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "BASE unreachable, trying FALLBACK: ${FALLBACK_URL}"
          HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "${FALLBACK_URL}" 2>/dev/null || true)
          echo "  HTTP status: ${HTTP_CODE}"

          if [[ "$HTTP_CODE" != "000" && -n "$HTTP_CODE" ]]; then
            echo "FALLBACK endpoint reachable"
            echo "selected=fallback" >> "$GITHUB_OUTPUT"
            echo "url=${FALLBACK_URL}" >> "$GITHUB_OUTPUT"
            echo "model=${{ vars.ANTHROPIC_MODEL_FALLBACK }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Both Anthropic endpoints unreachable"
          exit 1

      # ── Resolve API key for selected endpoint ───────────────────────────
      - name: Resolve API key
        id: resolve_key
        env:
          TOKEN_BASE: ${{ secrets.ANTHROPIC_TOKEN_BASE }}
          TOKEN_FALLBACK: ${{ secrets.ANTHROPIC_TOKEN_FALLBACK }}
        run: |
          if [ "${{ steps.anthropic.outputs.selected }}" = "base" ]; then
            echo "api_key=${TOKEN_BASE}" >> "$GITHUB_OUTPUT"
          else
            echo "api_key=${TOKEN_FALLBACK}" >> "$GITHUB_OUTPUT"
          fi

      # ── Clone test dataset ──────────────────────────────────────────────
      - name: Clone test dataset
        uses: actions/checkout@v4
        with:
          repository: The-Cloud-Clockwork/bridge-smoke-dataset
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
          path: bridge-smoke-dataset

      # ── Start local Docker stack ────────────────────────────────────────
      - name: Generate auth key and create .env
        id: auth
        env:
          LLM_API_BASE: ${{ steps.anthropic.outputs.url }}/v1
          LLM_API_KEY: ${{ steps.resolve_key.outputs.api_key }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          MCP_API_KEY=$(openssl rand -hex 16)
          echo "mcp_api_key=${MCP_API_KEY}" >> "$GITHUB_OUTPUT"
          cp agentibridge.env.example agentibridge.env
          echo "CLAUDE_DIR=${{ github.workspace }}/bridge-smoke-dataset/.claude" >> agentibridge.env
          echo "AGENTIBRIDGE_API_KEYS=${MCP_API_KEY}" >> agentibridge.env
          echo "AGENTIBRIDGE_EMBEDDING_ENABLED=true" >> agentibridge.env
          echo "LLM_API_BASE=${LLM_API_BASE}" >> agentibridge.env
          echo "LLM_API_KEY=${LLM_API_KEY}" >> agentibridge.env
          echo "LLM_EMBED_MODEL=text-embedding-3-small" >> agentibridge.env
          echo "CF_ACCESS_CLIENT_ID=${CF_ACCESS_CLIENT_ID}" >> agentibridge.env
          echo "CF_ACCESS_CLIENT_SECRET=${CF_ACCESS_CLIENT_SECRET}" >> agentibridge.env

      - name: Start Docker Compose
        run: docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            if docker inspect -f '{{.State.Running}}' agentibridge 2>/dev/null | grep -q true; then
              echo "Container running"
              break
            fi
            sleep 1
          done
          for i in $(seq 1 30); do
            if docker exec agentibridge python3 -c "from agentibridge.redis_client import get_redis; r=get_redis(); print(r.ping())" 2>/dev/null | grep -q True; then
              echo "Redis connected"
              break
            fi
            sleep 1
          done

      - name: Trigger initial collection
        run: |
          docker exec agentibridge python3 -c "
          import sys; sys.path.insert(0, '/app')
          import os; os.environ['AGENTIBRIDGE_ENABLED'] = 'false'
          from agentibridge.collector import SessionCollector
          from agentibridge.store import SessionStore
          store = SessionStore()
          c = SessionCollector(store)
          stats = c.collect_once()
          print(f'Collected: {stats}')
          assert stats['files_scanned'] >= 4, f'Expected >=4 files, got {stats[\"files_scanned\"]}'
          "

      - name: Wait for embeddings
        run: |
          echo "Waiting for embedding generation..."
          for i in $(seq 1 12); do
            COUNT=$(docker exec agentibridge-postgres psql -U agentibridge -tAc \
              "SELECT COUNT(*) FROM transcript_chunks" 2>/dev/null || echo "0")
            COUNT=$(echo "$COUNT" | tr -d '[:space:]')
            echo "  attempt ${i}: ${COUNT} chunks"
            if [[ "$COUNT" -gt 0 ]]; then
              echo "Embeddings generated!"
              break
            fi
            sleep 10
          done

      # ── Install Claude CLI ──────────────────────────────────────────────
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      # ── Generate .mcp.json ──────────────────────────────────────────────
      - name: Generate .mcp.json
        env:
          MCP_API_KEY: ${{ steps.auth.outputs.mcp_api_key }}
        run: |
          jq -n --arg url "http://localhost:8100/mcp" --arg key "$MCP_API_KEY" \
            '{mcpServers:{"agentibridge":{type:"http",url:$url,headers:{"X-API-Key":$key}}}}' \
            > .mcp.json

      # ── Run smoke tests ─────────────────────────────────────────────────
      - name: Run smoke tests
        env:
          ANTHROPIC_API_KEY: ${{ steps.resolve_key.outputs.api_key }}
          ANTHROPIC_BASE_URL: ${{ steps.anthropic.outputs.url }}
          CLAUDE_MODEL: ${{ steps.anthropic.outputs.model }}
          ANTHROPIC_CUSTOM_HEADERS: |-
            CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
            CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          echo "Endpoint: ${ANTHROPIC_BASE_URL}"
          echo "Model:    ${CLAUDE_MODEL}"
          echo ""
          chmod +x tests/e2e/test_mcp_smoke.sh
          ./tests/e2e/test_mcp_smoke.sh

      # ── Diagnostics ─────────────────────────────────────────────────────
      - name: Show container logs
        if: always()
        run: docker compose logs --tail=300

      - name: Stop Docker stack
        if: always()
        run: docker compose down
