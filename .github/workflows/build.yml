name: Docker Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Gate job: only runs on manual dispatch, requires release environment approval.
  # Skipped automatically on tag pushes — downstream job proceeds without waiting.
  gate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: anton
    environment: release
    steps:
      - run: echo "Manual dispatch approved"

  build:
    needs: gate
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    uses: The-Cloud-Clockwork/.github/.github/workflows/ghcr-build-reusable.yml@main
