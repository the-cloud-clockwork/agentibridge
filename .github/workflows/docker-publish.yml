name: Publish Docker image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Gate job: only runs on manual dispatch, requires release environment approval.
  # Skipped automatically on tag pushes — downstream job proceeds without waiting.
  gate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: anton
    environment: release
    steps:
      - run: echo "Manual dispatch approved"

  push:
    needs: gate
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    uses: The-Cloud-Clockwork/.github/.github/workflows/docker-publish-reusable.yml@main
    with:
      image_name: agentibridge
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
