name: Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'anton' }}
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit -v -m unit --cov=agentibridge --cov-report=term-missing --tb=short

  lint:
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'anton' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff>=0.4

      - name: Lint check
        run: ruff check agentibridge/ tests/

      - name: Format check
        run: ruff format --check agentibridge/ tests/

  integration:
    # Disabled for v0.5.0 — this job shells into a Docker container named
    # `agentibridge`, but v0.5.0 drops the app Docker image (only Redis +
    # Postgres sidecars remain in Docker; the app runs natively). The harness
    # in tests/integration/test_docker.py needs to be rewritten for the native
    # deployment model before this job can run again.
    if: false
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'anton' }}
    needs: [unit, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create env from example
        run: cp agentibridge.env.example agentibridge.env

      - name: Clone test dataset
        uses: actions/checkout@v4
        with:
          repository: The-Cloud-Clockwork/bridge-smoke-dataset
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
          path: bridge-smoke-dataset

      - name: Start Docker stack with test data
        run: |
          echo "CLAUDE_DIR=${{ github.workspace }}/bridge-smoke-dataset/.claude" >> agentibridge.env
          docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            if docker inspect -f '{{.State.Running}}' agentibridge 2>/dev/null | grep -q true; then
              echo "Container running"
              break
            fi
            sleep 1
          done
          for i in $(seq 1 30); do
            if docker exec agentibridge python3 -c "from agentibridge.redis_client import get_redis; r=get_redis(); print(r.ping())" 2>/dev/null | grep -q True; then
              echo "Redis connected"
              break
            fi
            sleep 1
          done

      - name: Trigger initial collection
        run: |
          docker exec agentibridge python3 -c "
          import sys; sys.path.insert(0, '/app')
          import os; os.environ['AGENTIBRIDGE_ENABLED'] = 'false'
          from agentibridge.collector import SessionCollector
          from agentibridge.store import SessionStore
          store = SessionStore()
          c = SessionCollector(store)
          stats = c.collect_once()
          print(f'Collected: {stats}')
          assert stats['files_scanned'] >= 4, f'Expected >=4 files, got {stats[\"files_scanned\"]}'
          "

      - name: Run integration tests
        run: python tests/integration/test_docker.py --test --report test-report.md

      - name: Publish test report
        if: always()
        run: |
          if [ -f test-report.md ]; then
            cat test-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: test-report.md
          if-no-files-found: ignore

      - name: Stop Docker stack
        if: always()
        run: docker compose down
